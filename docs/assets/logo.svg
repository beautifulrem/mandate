<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Mandate mark, in the MetaMask faceted low-poly language (flat triangular planes, the fox
       orange ramp + navy + beige): a shield of facets carrying a navy check (governance, approved),
       its tip CUT and offset — the on-chain kill switch. White rounded tile like the org avatar. -->
  <rect width="128" height="128" rx="28" fill="#ffffff"/>
  <!-- upper facets -->
  <polygon points="32,30 64,20 64,46" fill="#e2761b" stroke="#e2761b" stroke-width="0.6"/>
  <polygon points="64,20 96,30 64,46" fill="#f6851b" stroke="#f6851b" stroke-width="0.6"/>
  <polygon points="32,30 64,46 48,52" fill="#cd6116" stroke="#cd6116" stroke-width="0.6"/>
  <polygon points="96,30 80,52 64,46" fill="#e4751f" stroke="#e4751f" stroke-width="0.6"/>
  <polygon points="32,30 48,52 36,64" fill="#e2761b" stroke="#e2761b" stroke-width="0.6"/>
  <polygon points="96,30 92,64 80,52" fill="#cd6116" stroke="#cd6116" stroke-width="0.6"/>
  <!-- the beige face plate (diamond), fox-style -->
  <polygon points="48,52 64,46 80,52 64,72" fill="#d7c1b3" stroke="#d7c1b3" stroke-width="0.6"/>
  <!-- flank facets -->
  <polygon points="36,64 48,52 64,72" fill="#f6851b" stroke="#f6851b" stroke-width="0.6"/>
  <polygon points="80,52 92,64 64,72" fill="#e2761b" stroke="#e2761b" stroke-width="0.6"/>
  <!-- lower band, tapering to the severed seam -->
  <polygon points="36,64 64,72 50.5,88" fill="#cd6116" stroke="#cd6116" stroke-width="0.6"/>
  <polygon points="64,72 92,64 77.5,88" fill="#763d16" stroke="#763d16" stroke-width="0.6"/>
  <polygon points="64,72 77.5,88 50.5,88" fill="#e4751f" stroke="#e4751f" stroke-width="0.6"/>
  <!-- the severed tip: cut clean off and shifted — revocation is part of the mark -->
  <polygon points="56.5,93 66.5,93 66.5,113" fill="#e2761b" stroke="#e2761b" stroke-width="0.6"/>
  <polygon points="66.5,93 76.5,93 66.5,113" fill="#763d16" stroke="#763d16" stroke-width="0.6"/>
  <!-- the navy check on the plate (the vote that the mandate exists to cast) -->
  <polygon points="55,59 62,66 74,51.5 70,48.5 62,57.5 58.5,54.5" fill="#233447" stroke="#233447" stroke-width="0.6"/>
</svg>
